<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisasi Bubble Sort - Lapang & Rapi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 30px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .nav-wrapper { width: 100%; max-width: 850px; margin-bottom: 20px; }
        .back-btn { display: inline-flex; align-items: center; text-decoration: none; color: #64748b; font-weight: 600; padding: 10px 18px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .back-btn:hover { background: #f1f5f9; color: #0f172a; }
        .container { width: 100%; max-width: 850px; background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h1 { color: #0f172a; margin-bottom: 12px; font-size: 2rem; font-weight: 700; }
        p.desc { color: #64748b; margin-bottom: 25px; font-size: 1rem; line-height: 1.6; }
        
        /* Layout Input & Tombol Kontrol */
        .controls { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; }
        .input-wrapper { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .btn-wrapper { display: flex; gap: 12px; flex-wrap: wrap; }
        label { font-size: 0.88rem; font-weight: 600; color: #334155; }
        input[type="text"] { padding: 12px; font-size: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; outline: none; }
        input[type="text"]:focus { border-color: #ef4444; }
        
        button { padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; flex: 1; min-width: 180px; }
        .btn-primary { background-color: #ef4444; color: white; }
        .btn-primary:hover:not(:disabled) { background-color: #dc2626; }
        .btn-secondary { background-color: #3b82f6; color: white; }
        .btn-secondary:hover:not(:disabled) { background-color: #2563eb; }
        button:disabled, input:disabled { background-color: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; opacity: 0.7; }
        
        /* PERBAIKAN UTAMA: Fitur Scroll Kiri-Kanan Aktif Jika Space Melebihi Batas Layar */
        .chart-wrapper { 
            background: #0f172a; 
            padding: 60px 30px 25px 30px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            overflow-x: auto; /* Mengaktifkan scroll horizontal */
            scrollbar-width: thin; /* Kerapian scrollbar di browser modern */
            scrollbar-color: #475569 #0f172a;
        }
        
        /* Modifikasi penataan chart agar batang tetap mempertahankan ukuran idealnya saat di-scroll */
        #chart { 
            display: flex; 
            justify-content: flex-start; /* Dimulai dari kiri agar saat scroll terasa natural */
            align-items: flex-end; 
            height: 280px; 
            gap: 16px; 
            border-bottom: 4px solid #334155; 
            min-width: max-content; /* Memaksa container melebar mengikuti jumlah batang */
            margin: 0 auto; /* Menjaga posisi tetap di tengah jika batangnya sedikit */
        }
        
        /* DESAIN BATANG MURNI TANPA KOTAK TEKS INTERNAL */
        .bar { 
            width: 45px; 
            background-color: #3b82f6; 
            border-radius: 6px 6px 0 0; 
            transition: height 0.25s ease, background-color 0.25s ease; 
            position: relative; 
            flex-shrink: 0; /* Mencegah batang gepeng tertekan layar */
        }
        
        /* Label Angka Minimalis Di Atas Batang */
        .bar::after { 
            content: attr(data-value); 
            position: absolute; 
            top: -28px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #f8fafc; 
            font-size: 0.9rem; 
            font-weight: 700; 
        }

        /* Status Warna Animasi */
        .bar.comparing { background-color: #eab308 !important; }
        .bar.swapping { background-color: #f97316 !important; }
        .bar.sorted { background-color: #10b981 !important; }
        
        #status-log { background: #f8fafc; padding: 16px 20px; border-left: 5px solid #ef4444; border-radius: 4px 12px 12px 4px; font-size: 1rem; color: #334155; min-height: 56px; display: flex; align-items: center; border: 1px solid #e2e8f0; border-left-width: 5px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="nav-wrapper"><a href="index.html" class="back-btn">← Kembali ke Dashboard</a></div>
    <div class="container">
        <h1>Visualisasi Fleksibel: Bubble Sort</h1>
        <p class="desc">Kiri-kanan diagram dapat digeser (*scrollable*) jika Anda memasukkan banyak angka acak, memastikan visualisasi tetap rapi tanpa terpotong layar.</p>
        <div class="controls">
            <div class="input-wrapper">
                <label for="arrayInput">Masukkan Deretan Angka (Maksimal 12 angka, pisahkan dengan koma):</label>
                <input type="text" id="arrayInput" value="45, 12, 89, 3, 27, 66, 1, 95, 14">
            </div>
            <div class="btn-wrapper">
                <button class="btn-secondary" id="randomBtn" onclick="generateRandomSample()">Gunakan Sampel Acak</button>
                <button class="btn-primary" id="startBtn" onclick="processAndSort()">Proses Input & Urutkan</button>
            </div>
        </div>
        <div class="chart-wrapper">
            <div id="chart"></div>
        </div>
        <div id="status-log">Masukkan deretan angka Anda di atas, lalu klik tombol Proses.</div>
    </div>
    <script>
        let data = [];
        const chart = document.getElementById('chart');
        const statusLog = document.getElementById('status-log');
        let isRunning = false;

        function generateRandomSample() {
            if(isRunning) return;
            let sample = [];
            let totalAngka = Math.floor(Math.random() * 5) + 7; // Acak antara 7 sampai 11 angka
            for(let i=0; i<totalAngka; i++) { sample.push(Math.floor(Math.random() * 98) + 1); }
            document.getElementById('arrayInput').value = sample.join(', ');
            statusLog.innerText = "Sampel angka acak baru berhasil dibuat.";
            parseInputAndRender();
        }

        function parseInputAndRender() {
            let inputStr = document.getElementById('arrayInput').value;
            let items = inputStr.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            
            if(items.length === 0) {
                statusLog.innerText = "Error: Input tidak valid!";
                return false;
            }
            if(items.length > 12) {
                statusLog.innerText = "Sistem membatasi maksimal 12 angka demi kenyamanan presentasi.";
                items = items.slice(0, 12);
                document.getElementById('arrayInput').value = items.join(', ');
            }
            data = items;
            renderChart();
            return true;
        }

        function renderChart() {
            chart.innerHTML = '';
            let maxVal = Math.max(...data, 1);
            
            data.forEach((value) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.setAttribute('data-value', value);
                
                // Menghitung tinggi proporsional (Maksimal tinggi batang 210px)
                let calculatedHeight = (value / maxVal) * 210; 
                // Angka kecil (seperti 1) tetap diberi batas minimal tinggi 15px agar terlihat di dasar grafik
                bar.style.height = `${Math.max(calculatedHeight, 15)}px`; 
                
                chart.appendChild(bar);
            });
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startBubbleSort() {
            if(isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('randomBtn').disabled = true;
            document.getElementById('arrayInput').disabled = true;
            
            const bars = document.getElementsByClassName('bar');
            let n = data.length;

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    bars[j].classList.add('comparing');
                    bars[j+1].classList.add('comparing');
                    statusLog.innerText = `Membandingkan nilai (${data[j]}) dengan (${data[j+1]})`;
                    await sleep(600);

                    if (data[j] > data[j + 1]) {
                        statusLog.innerText = `Kondisi terpenuhi: ${data[j]} > ${data[j+1]}. Tukar posisi!`;
                        bars[j].classList.add('swapping');
                        bars[j+1].classList.add('swapping');

                        let temp = data[j];
                        data[j] = data[j + 1];
                        data[j + 1] = temp;
                        
                        await sleep(400);
                        renderChart();
                        
                        // Menjaga status warna pasca rendering ulang di tengah pergeseran posisi
                        bars[j].classList.add('comparing');
                        bars[j+1].classList.add('comparing');
                    }
                    
                    // Kembalikan warna penanda sesudah selesai dibandingkan
                    if(bars[j]) bars[j].classList.remove('comparing', 'swapping');
                    if(bars[j+1]) bars[j+1].classList.remove('comparing', 'swapping');
                }
                // Elemen di ujung kanan pada iterasi ini dipastikan sudah di posisi yang benar (Sorted)
                if(bars[n - i - 1]) bars[n - i - 1].classList.add('sorted');
            }
            if(bars[0]) bars[0].classList.add('sorted');
            statusLog.innerText = "Sukses! Seluruh deretan angka Anda telah berhasil diurutkan dengan rapi.";
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('randomBtn').disabled = false;
            document.getElementById('arrayInput').disabled = false;
        }

        function processAndSort() {
            if(parseInputAndRender()) { startBubbleSort(); }
        }

        // Jalankan render awal saat halaman di-load
        parseInputAndRender();
    </script>
</body>
</html>
